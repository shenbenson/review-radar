name: ReviewRadar
options:
  bundleIdPrefix: com.reviewradar
  deploymentTarget:
    macOS: "15.0"
  minimumXcodeGenVersion: "2.38"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  ReviewRadar:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        CFBundleName: ReviewRadar
        CFBundleDisplayName: ReviewRadar
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reviewradar.app
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
